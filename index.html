<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreightMath BidRight — KSM Transport Advisors</title>

  <!-- External Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

  <!-- Custom Styles -->
  <link rel="stylesheet" href="styles.css?v=1">
</head>
<body>

  <!-- Persistent FreightMath Logo -->
  <img id="fm-logo" src="https://info.ksmcpa.com/hubfs/FreightMath/Images/KSM_FM_Logo_RGB_Color.png" alt="FreightMath">

  <!-- Progress Track (Hidden by default) -->
  <div id="progress-track">
    <div id="progress-bar" style="width: 0%"></div>
  </div>

  <!-- Section Navigation Dots -->
  <div id="section-nav"></div>

  <!-- Main Slide Deck Container -->
  <div id="deck">

    <!-- SLIDE 0: HERO -->
    <div class="slide slide-hero active" data-section="Intro">
      <div class="center-content stagger">
        <div class="section-label" style="justify-content:center;font-size:16px">FreightMath by <strong>KSM Transport Advisors</strong></div>
        <h1 class="headline" style="margin-bottom:20px;font-size:clamp(104px, 12.5vw, 180px)">FreightMath <span class="accent">BidRight</span></h1>
        <p class="subtitle" style="text-align:center;font-size:clamp(24px, 2.6vw, 32px)">Interactive Primer &amp; Demo</p>
        <div class="divider-line" style="margin:28px auto"></div>
        <p style="font-size:25px;color:var(--steel)">Chris Henry &nbsp;&middot;&nbsp; President &nbsp;&middot;&nbsp; <strong>KSM Transport Advisors</strong></p>
      </div>
    </div>

    <!-- SLIDE 1: PLACEHOLDER -->
    <div class="slide slide-dark" data-section="Overview">
      <div class="center-content stagger">
        <div class="section-label">Getting Started</div>
        <h2 class="slide-title">Slides Go Here</h2>
        <p style="color:var(--steel);font-size:20px;line-height:1.6;max-width:900px">This is a placeholder deck. Add your slide content inside the <code style="background:rgba(255,255,255,0.1);padding:2px 8px;border-radius:4px;font-family:var(--font-mono)">&lt;div id="deck"&gt;</code> container.</p>
      </div>
    </div>

  </div>

  <!-- Bottom Navigation -->
  <nav id="nav">
    <button class="nav-btn" id="prev-btn" onclick="navigate(-1)" disabled>&larr; Previous</button>
    <div id="slide-counter"><span>1</span> / 2</div>
    <button class="nav-btn" id="next-btn" onclick="navigate(1)">Next &rarr;</button>
  </nav>

  <!-- Leaflet JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <!-- Application Scripts (order matters) -->
  <script src="config.js?v=1"></script>
  <script src="map.js?v=1"></script>
  <script src="presentation.js?v=1"></script>

</body>
</html>
